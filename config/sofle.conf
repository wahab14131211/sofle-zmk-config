# Enable RGB Underglow (ZMK handles per-key as underglow)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Force them on when the keyboard turns on
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# Set a safe starting brightness (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20

# Enable the OLED Display
CONFIG_ZMK_DISPLAY=y

# (Optional but highly recommended) Turn off the screen when the keyboard is idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Enable Deep Sleep
CONFIG_ZMK_SLEEP=y

# Milliseconds of inactivity before going to sleep (300000ms = 5 minutes)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Boost Bluetooth signal to prevent connection drops
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable battery reporting for both halves
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Increase debounce time to prevent double-typing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Enable rotary encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

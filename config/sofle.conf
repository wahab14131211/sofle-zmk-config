# Enable RGB Underglow (ZMK handles per-key as underglow)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Force them on when the keyboard turns on
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# Set a safe starting brightness (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20

# Enable the OLED Display
CONFIG_ZMK_DISPLAY=y

# (Optional but highly recommended) Turn off the screen when the keyboard is idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
